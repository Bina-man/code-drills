name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  server-app-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
        architecture: 'x64'
      env:
        AGENT_TOOLSDIRECTORY: /opt/hostedtoolcache

    - name: Install server-app dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r server-app/requirements.txt

    - name: Run server-app tests
      run: pytest server-app/tests
