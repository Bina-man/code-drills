name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  client-app-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'

    - name: Install client-app dependencies
      run: |
        cd client-app
        npm install

    - name: Build client-app
      run: |
        cd client-app
        npm run build

  server-app-test:
    runs-on: ubuntu-latest
    needs: client-app-build  # Ensure server tests run only after client build
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install server-app dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r server-app/requirements.txt

    - name: Run server-app tests
      run: pytest server-app/tests

  client-app-test:
    runs-on: ubuntu-latest
    needs: client-app-build
    steps:
    - uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'

    - name: Install client-app dependencies
      run: |
        cd client-app
        npm install

    - name: Run client-app tests
      run: |
        cd client-app
        npm test -- --watchAll=false
